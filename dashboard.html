<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Franky Franchise — Dashboard</title>
  <meta name="description" content="Your Franky Health Score dashboard. See your score, four pillar breakdown, action plan, and benchmarks at a glance.">

  <!-- Open Graph -->
  <meta property="og:title" content="Franky Franchise — Dashboard">
  <meta property="og:description" content="Your Franky Health Score, pillar breakdown, and action plan.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/franky-badge.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/franky-mascot.png">

  <!-- Design system styles -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="site.css">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Design system component bundle -->
  <script src="ds-bundle.js"></script>

  <style>html,body{margin:0;background:var(--surface-page)}</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="js/dashboard.jsx"></script>
  <script type="text/babel">
    function mount() {
      if (!window.DashboardPage) return setTimeout(mount, 40);
      ReactDOM.createRoot(document.getElementById('root')).render(<DashboardPage />);
      if (window.lucide) window.lucide.createIcons();
    }
    mount();
  </script>
</body>
</html>
