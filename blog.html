<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operator Blog — Franky Franchise</title>
  <meta name="description" content="Data-driven operational audits, cost-leak breakdowns, and systems guides for QSR, automotive, and multi-unit franchise operators.">

  <!-- Open Graph -->
  <meta property="og:title" content="Operator Blog — Franky Franchise">
  <meta property="og:description" content="Data-driven operational audits, cost-leak breakdowns, and systems guides.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://frankyfranchise.com/assets/franky-badge.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/franky-mascot.png">

  <!-- Design system styles -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="site.css">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Design system component bundle -->
  <script src="ds-bundle.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <style>html,body{margin:0;background:var(--surface-page)}</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="js/blog.jsx"></script>
  <script type="text/babel">
    function mount() {
      if (!window.BlogPage) return setTimeout(mount, 40);
      ReactDOM.createRoot(document.getElementById('root')).render(<BlogPage />);
      if (window.lucide) window.lucide.createIcons();
    }
    mount();
  </script>
</body>
</html>
