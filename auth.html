<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Franky Franchise</title>
  <meta name="description" content="Sign in or create your Franky Franchise account to run diagnostics, track your health score, and get your action plan.">

  <!-- Open Graph -->
  <meta property="og:title" content="Sign In — Franky Franchise">
  <meta property="og:description" content="Access your Franky Health Score dashboard.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://frankyfranchise.com/assets/franky-badge.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/franky-mascot.png">

  <!-- Design system styles -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="site.css">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Design system component bundle -->
  <script src="ds-bundle.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <style>html,body{margin:0;background:var(--surface-page)}</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="js/auth.jsx"></script>
  <script type="text/babel">
    function mount() {
      if (!window.AuthPage) return setTimeout(mount, 40);
      ReactDOM.createRoot(document.getElementById('root')).render(<AuthPage />);
      if (window.lucide) window.lucide.createIcons();
    }
    mount();
  </script>
</body>
</html>
